<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist - NovaCart</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Sticky Navigation Header -->
  <header class="glass scrolled">
    <div class="container navbar">
      <a href="/" class="logo">
        <i class="fas fa-shopping-bag"></i> Nova<span>Cart</span>
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/shop/">Shop</a></li>
        <li><a href="/about/">About</a></li>
        <li><a href="/contact/">Contact</a></li>
      </ul>
      <div class="nav-icons">
        <button id="theme-toggle" class="nav-icon"><i class="fas fa-moon"></i></button>
        <a href="/wishlist/" class="nav-icon">
          <i class="fas fa-heart"></i>
          <span id="wishlist-count-badge" class="badge-count" style="display: none;">0</span>
        </a>
        <a href="/cart/" class="nav-icon">
          <i class="fas fa-shopping-cart"></i>
          <span id="cart-count-badge" class="badge-count" style="display: none;">0</span>
        </a>
        <div id="nav-user-container"></div>
      </div>
    </div>
  </header>

  <div class="container" style="margin-top: 100px; margin-bottom: 80px;">
    <h1 style="font-size: 28px; font-weight: 700; margin-bottom: 30px; color: var(--slate-900);">My Wishlist</h1>

    <!-- Empty Wishlist Pane -->
    <div class="empty-state glass" id="wishlist-empty" style="display: none;">
      <div class="empty-state-icon"><i class="far fa-heart"></i></div>
      <h2>Your Wishlist is Empty</h2>
      <p style="color:var(--slate-500); margin-bottom: 24px;">Browse products and save your favorite items here.</p>
      <a href="/shop/" class="btn-primary">Browse Shop</a>
    </div>

    <!-- Active Wishlist Grid -->
    <div class="products-grid" id="wishlist-products-grid" style="display: none;">
      <!-- Wishlist items loaded dynamically -->
    </div>
  </div>

  <!-- Firebase & Services Scripts -->
  <script src="/static/firebase-config.js"></script>
  <script src="/static/firebase-services.js"></script>
  <script src="/static/js/main.js"></script>

  <!-- Local Page Logic -->
  <script>
    let productsCache = {};

    document.addEventListener("DOMContentLoaded", async () => {
      await loadWishlist();
    });

    async function loadWishlist() {
      const wishlist = window.WishlistManager.get();
      
      if (wishlist.length === 0) {
        showEmptyState();
        return;
      }

      const grid = document.getElementById("wishlist-products-grid");
      grid.style.display = "grid";
      grid.innerHTML = Array(3).fill(0).map(() => '<div class="skeleton-card"></div>').join('');

      try {
        const res = await window.NovaDB.getProducts({ limit: 100 });
        res.products.forEach(p => {
          productsCache[p.productId] = p;
        });

        const wishlistItems = res.products.filter(p => wishlist.includes(p.productId));
        
        if (wishlistItems.length === 0) {
          showEmptyState();
          return;
        }

        document.getElementById("wishlist-empty").style.display = "none";
        renderWishlist(wishlistItems, grid);
      } catch (err) {
        grid.innerHTML = '<p style="color:var(--danger)">Error loading wishlist products.</p>';
      }
    }

    function showEmptyState() {
      document.getElementById("wishlist-empty").style.display = "block";
      document.getElementById("wishlist-products-grid").style.display = "none";
      window.updateNavCounts();
    }

    function renderWishlist(products, element) {
      element.innerHTML = products.map(p => {
        const discPrice = p.price * (1 - p.discount/100.0);
        const hasDiscount = p.discount > 0;
        const isOutOfStock = p.stock === 0;

        return `
          <div class="product-card glass" data-id="${p.productId}">
            <div class="product-image-container">
              <img src="${p.images[0]}" alt="${p.name}">
              ${hasDiscount ? `<span class="product-discount-tag">${p.discount}% OFF</span>` : ''}
              ${isOutOfStock ? `<span class="product-discount-tag" style="background:var(--slate-500); left:auto; right:12px;">OUT OF STOCK</span>` : ''}
              <button class="product-wishlist-btn active" onclick="event.preventDefault(); toggleWishlistClick('${p.productId}')">
                <i class="fas fa-heart"></i>
              </button>
            </div>
            <div class="product-details-content">
              <span class="product-brand">${p.brand}</span>
              <a href="/product/${p.productId}/" class="product-title">${p.name}</a>
              <div class="product-price-row">
                <span class="product-current-price">$${discPrice.toFixed(2)}</span>
                ${hasDiscount ? `<span class="product-original-price">$${p.price.toFixed(2)}</span>` : ''}
              </div>
              <div class="product-card-footer" style="display:flex; gap:8px;">
                ${isOutOfStock 
                  ? `<button class="product-add-cart-btn" style="cursor:not-allowed;" disabled><i class="fas fa-ban"></i> Out of Stock</button>`
                  : `<button class="product-add-cart-btn" onclick="moveToCartClick('${p.productId}')" style="flex-grow:1;"><i class="fas fa-shopping-cart"></i> Move to Cart</button>`
                }
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleWishlistClick(productId) {
      window.WishlistManager.toggle(productId);
      loadWishlist();
    }

    function moveToCartClick(productId) {
      // Add to cart
      window.CartManager.add(productId, 1);
      // Remove from wishlist
      window.WishlistManager.toggle(productId);
      // Reload wishlist view
      loadWishlist();
    }
  </script>

</body>
</html>
